<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso | Video Publisher</title>
  <style>
    :root {
      --lakers-purple: #552583;
      --lakers-purple-dark: #1b1230;
      --lakers-black: #0b0b12;
      --lakers-gold: #fdb927;
      --text-primary: #f5f2ff;
      --text-secondary: #cfc7e8;
      --border-soft: rgba(253, 185, 39, 0.2);
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text-primary);
      background:
        radial-gradient(circle at 12% 10%, rgba(253, 185, 39, 0.14), transparent 32%),
        radial-gradient(circle at 88% 14%, rgba(85, 37, 131, 0.26), transparent 34%),
        linear-gradient(145deg, #100a1e 0%, #0b0b12 60%, #08080d 100%);
    }
    .card {
      width: 100%;
      max-width: 460px;
      background: linear-gradient(180deg, rgba(28, 16, 48, 0.92), rgba(13, 10, 22, 0.96));
      border-radius: 16px;
      padding: 30px;
      border: 1px solid var(--border-soft);
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.34);
    }
    .brand-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #221534;
      background: var(--lakers-gold);
      border-radius: 999px;
      padding: 5px 10px;
      margin-bottom: 10px;
    }
    h1 { margin: 0 0 8px; font-size: 28px; letter-spacing: 0.2px; }
    h1 .gold { color: var(--lakers-gold); }
    p { margin: 0 0 20px; color: var(--text-secondary); font-size: 14px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; color: var(--text-primary); }
    input {
      width: 100%;
      border: 1px solid rgba(253, 185, 39, 0.22);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 14px;
      font-size: 14px;
      background: rgba(16, 11, 26, 0.76);
      color: var(--text-primary);
    }
    input:focus {
      outline: none;
      border-color: var(--lakers-gold);
      box-shadow: 0 0 0 3px rgba(253, 185, 39, 0.15);
    }
    button {
      width: 100%;
      border: none;
      border-radius: 10px;
      background: linear-gradient(180deg, #f7bf3f, #fdb927);
      color: #231038;
      padding: 11px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s ease;
    }
    button:hover { filter: brightness(1.03); transform: translateY(-1px); }
    .msg { margin-top: 12px; min-height: 18px; font-size: 13px; }
    .err { color: #ff8e8e; }
    .ok { color: #8cffc2; }
  </style>
</head>
<body>
  <main class="card">
    <span class="brand-kicker">El Laboratorio de Jorge Lorenzo by Pinto Lakers</span>
    <h1><span class="gold">Video</span> Publisher</h1>
    <p>Accede con tus credenciales para entrar en Admin o Sala privada.</p>

    <form id="login-form">
      <label for="username">Usuario</label>
      <input id="username" type="text" autocomplete="username" required>

      <label for="password">Contraseña</label>
      <input id="password" type="password" autocomplete="current-password" required>

      <button type="submit">Entrar</button>
      <div id="msg" class="msg"></div>
    </form>
  </main>

  <script>
    const form = document.getElementById('login-form');
    const msg = document.getElementById('msg');

    function setMessage(text, type) {
      msg.textContent = text || '';
      msg.className = `msg ${type || ''}`;
    }

    async function initStatus() {
      const resp = await fetch('/api/auth/status');
      const data = await resp.json();
      if (data.authenticated && data.role === 'admin') {
        location.replace('/admin');
        return;
      }
      if (data.authenticated && data.role === 'viewer') {
        location.replace('/sala');
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      setMessage('');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const resp = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) {
        setMessage(data.error || 'No se pudo iniciar sesión', 'err');
        return;
      }
      setMessage('Acceso correcto. Redirigiendo...', 'ok');
      if (data.role === 'admin') location.replace('/admin');
      else location.replace('/sala');
    });

    initStatus().catch(() => setMessage('No se pudo conectar con el servidor', 'err'));
  </script>
</body>
</html>
