<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sala privada | Video Publisher</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: #0f172a; color: #e5e7eb; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .btn { background: #1f2937; border: 1px solid #334155; color: #e5e7eb; border-radius: 8px; padding: 8px 12px; cursor: pointer; text-decoration: none; }
    .btn:hover { background: #334155; }
    .layout { display: grid; grid-template-columns: 320px 1fr; gap: 18px; }
    .panel { background: #111827; border: 1px solid #1f2937; border-radius: 12px; overflow: hidden; min-height: 420px; }
    .panel h2 { margin: 0; padding: 14px 16px; font-size: 16px; border-bottom: 1px solid #1f2937; }
    .list { max-height: 70vh; overflow-y: auto; }
    .item { width: 100%; text-align: left; border: none; background: transparent; color: inherit; padding: 12px 16px; border-bottom: 1px solid #1f2937; cursor: pointer; }
    .item:hover, .item.active { background: #1f2937; }
    .title { font-size: 14px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .meta { color: #94a3b8; font-size: 12px; margin-top: 4px; display: block; }
    .player-wrap { padding: 16px; }
    video { width: 100%; max-height: 70vh; background: black; border-radius: 10px; }
    .empty { color: #94a3b8; padding: 18px; }
    @media (max-width: 980px) { .layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <h1 style="margin:0; font-size: 22px;">Sala privada</h1>
      <div style="display:flex; gap:8px;">
        <a id="admin-link" href="/admin" class="btn" style="display:none;">Ir a admin</a>
        <button id="logout" class="btn">Cerrar sesión</button>
      </div>
    </div>

    <div class="layout">
      <section class="panel">
        <h2>Videos</h2>
        <div id="video-list" class="list">
          <div class="empty">Cargando videos...</div>
        </div>
      </section>

      <section class="panel">
        <h2 id="current-title">Selecciona un video</h2>
        <div class="player-wrap">
          <video id="player" controls playsinline></video>
        </div>
      </section>
    </div>
  </div>

  <script>
    const listEl = document.getElementById('video-list');
    const player = document.getElementById('player');
    const currentTitle = document.getElementById('current-title');
    const logoutBtn = document.getElementById('logout');
    const adminLink = document.getElementById('admin-link');
    let videos = [];

    function formatDate(value) {
      if (!value) return '';
      const d = new Date(value);
      return d.toLocaleDateString('es-ES');
    }

    async function checkSession() {
      const resp = await fetch('/api/auth/status');
      const data = await resp.json();
      if (!data.authenticated) {
        location.replace('/login');
        return false;
      }
      if (data.role === 'admin') adminLink.style.display = 'inline-block';
      return true;
    }

    function renderList() {
      if (!videos.length) {
        listEl.innerHTML = '<div class="empty">No hay videos disponibles en la carpeta privada.</div>';
        return;
      }
      listEl.innerHTML = videos.map((v, idx) => `
        <button class="item ${idx === 0 ? 'active' : ''}" data-id="${v.id}" data-title="${(v.title || '').replace(/"/g, '&quot;')}">
          <span class="title">${v.title}</span>
          <span class="meta">${formatDate(v.modifiedTime)}</span>
        </button>
      `).join('');
    }

    function playVideo(id, title) {
      currentTitle.textContent = title || 'Reproduciendo';
      player.src = `/api/private/videos/${encodeURIComponent(id)}/stream`;
      player.play().catch(() => {});
      document.querySelectorAll('.item').forEach((btn) => btn.classList.toggle('active', btn.dataset.id === id));
    }

    async function loadVideos() {
      const resp = await fetch('/api/private/videos');
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) {
        listEl.innerHTML = `<div class="empty">${data.error || 'No se pudieron cargar los videos.'}</div>`;
        return;
      }
      videos = data.videos || [];
      renderList();
      if (videos[0]) playVideo(videos[0].id, videos[0].title);
    }

    listEl.addEventListener('click', (e) => {
      const btn = e.target.closest('.item');
      if (!btn) return;
      playVideo(btn.dataset.id, btn.dataset.title);
    });

    logoutBtn.addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST' });
      location.replace('/login');
    });

    (async () => {
      const ok = await checkSession();
      if (!ok) return;
      await loadVideos();
    })();
  </script>
</body>
</html>
