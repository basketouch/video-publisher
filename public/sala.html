<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sala privada | Video Publisher</title>
  <style>
    :root {
      --lakers-purple: #552583;
      --lakers-purple-dark: #1b1230;
      --lakers-black: #0b0b12;
      --lakers-gold: #fdb927;
      --text-primary: #f5f2ff;
      --text-secondary: #cfc7e8;
      --border-soft: rgba(253, 185, 39, 0.18);
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      margin: 0;
      color: var(--text-primary);
      background:
        radial-gradient(circle at 12% 10%, rgba(253, 185, 39, 0.14), transparent 32%),
        radial-gradient(circle at 88% 14%, rgba(85, 37, 131, 0.26), transparent 34%),
        linear-gradient(145deg, #100a1e 0%, #0b0b12 60%, #08080d 100%);
      min-height: 100vh;
    }
    .container { max-width: 1240px; margin: 0 auto; padding: 28px 24px; }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      gap: 16px;
      padding: 14px 18px;
      border-radius: 14px;
      background: linear-gradient(90deg, rgba(85, 37, 131, 0.58), rgba(40, 18, 64, 0.85));
      border: 1px solid var(--border-soft);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.32);
    }
    .brand-title { margin: 0; font-size: 26px; letter-spacing: 0.3px; }
    .brand-title .gold { color: var(--lakers-gold); }
    .brand-subtitle { margin: 4px 0 0; color: var(--text-secondary); font-size: 13px; }
    .btn {
      border-radius: 10px;
      padding: 9px 14px;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.18s ease;
      border: 1px solid transparent;
      color: var(--text-primary);
      background: rgba(17, 12, 28, 0.86);
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-admin {
      border-color: rgba(253, 185, 39, 0.4);
      background: rgba(85, 37, 131, 0.62);
    }
    .btn-admin:hover { background: rgba(85, 37, 131, 0.78); }
    .btn-logout {
      border-color: rgba(253, 185, 39, 0.5);
      background: linear-gradient(180deg, #f7bf3f, #fdb927);
      color: #231038;
    }
    .btn-logout:hover { filter: brightness(1.03); }
    .layout { display: grid; grid-template-columns: 340px 1fr; gap: 18px; }
    .panel {
      background: linear-gradient(180deg, rgba(28, 16, 48, 0.92), rgba(13, 10, 22, 0.96));
      border: 1px solid var(--border-soft);
      border-radius: 14px;
      overflow: hidden;
      min-height: 500px;
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.28);
    }
    .panel h2 {
      margin: 0;
      padding: 14px 16px;
      font-size: 16px;
      letter-spacing: 0.2px;
      border-bottom: 1px solid rgba(253, 185, 39, 0.16);
      color: var(--lakers-gold);
      background: rgba(14, 10, 23, 0.7);
    }
    .list { max-height: 75vh; overflow-y: auto; }
    .item {
      width: 100%;
      text-align: left;
      border: none;
      background: transparent;
      color: inherit;
      padding: 13px 16px;
      border-bottom: 1px solid rgba(253, 185, 39, 0.08);
      cursor: pointer;
      transition: background 0.18s ease, border-left-color 0.18s ease;
      border-left: 3px solid transparent;
    }
    .item:hover { background: rgba(85, 37, 131, 0.3); }
    .item.active {
      background: rgba(85, 37, 131, 0.38);
      border-left-color: var(--lakers-gold);
    }
    .title { font-size: 14px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
    .meta { color: var(--text-secondary); font-size: 12px; margin-top: 4px; display: block; }
    .player-wrap {
      padding: 16px;
      position: relative;
      background: radial-gradient(circle at 50% 0%, rgba(253, 185, 39, 0.08), transparent 40%);
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #221534;
      background: var(--lakers-gold);
      border-radius: 999px;
      padding: 5px 10px;
      margin: 0 0 10px;
    }
    video {
      width: 100%;
      max-height: 72vh;
      background: #000;
      border-radius: 12px;
      border: 1px solid rgba(253, 185, 39, 0.28);
      box-shadow: 0 16px 28px rgba(0, 0, 0, 0.35);
    }
    .notes-box {
      margin-top: 14px;
      border: 1px solid rgba(253, 185, 39, 0.2);
      border-radius: 12px;
      padding: 12px;
      background: rgba(14, 10, 23, 0.72);
    }
    .notes-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .notes-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--lakers-gold);
      font-weight: 700;
    }
    .notes-meta {
      font-size: 12px;
      color: var(--text-secondary);
    }
    .notes-text {
      white-space: pre-wrap;
      color: var(--text-primary);
      background: rgba(6, 4, 12, 0.45);
      border-radius: 8px;
      border: 1px solid rgba(253, 185, 39, 0.15);
      min-height: 88px;
      padding: 10px;
      font-size: 14px;
      line-height: 1.4;
    }
    .notes-editor {
      display: none;
      width: 100%;
      min-height: 110px;
      resize: vertical;
      border-radius: 8px;
      border: 1px solid rgba(253, 185, 39, 0.28);
      background: rgba(6, 4, 12, 0.65);
      color: var(--text-primary);
      padding: 10px;
      font-size: 14px;
      line-height: 1.4;
    }
    .notes-editor:focus {
      outline: none;
      border-color: var(--lakers-gold);
      box-shadow: 0 0 0 3px rgba(253, 185, 39, 0.15);
    }
    .notes-actions {
      display: none;
      justify-content: flex-end;
      margin-top: 10px;
    }
    .btn-save {
      border-color: rgba(253, 185, 39, 0.45);
      background: linear-gradient(180deg, #f7bf3f, #fdb927);
      color: #231038;
      font-weight: 700;
    }
    .btn-save:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .empty { color: var(--text-secondary); padding: 18px; }
    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .brand-title { font-size: 22px; }
      .toolbar { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <div>
        <h1 class="brand-title"><span class="gold">El Laboratorio de Jorge Lorenzo</span> by Pinto Lakers</h1>
        <p class="brand-subtitle">Sala privada para revisión y conversación de jugadas.</p>
      </div>
      <div style="display:flex; gap:8px;">
        <a id="admin-link" href="/admin" class="btn btn-admin" style="display:none;">Ir a admin</a>
        <button id="logout" class="btn btn-logout">Cerrar sesión</button>
      </div>
    </div>

    <div class="layout">
      <section class="panel">
        <h2>Videos</h2>
        <div id="video-list" class="list">
          <div class="empty">Cargando videos...</div>
        </div>
      </section>

      <section class="panel">
        <h2 id="current-title">Selecciona un video</h2>
        <div class="player-wrap">
          <span class="status-pill">Analisis privado</span>
          <video id="player" controls playsinline preload="metadata"></video>
          <div class="notes-box">
            <div class="notes-header">
              <span class="notes-title">Analisis del video</span>
              <span id="notes-meta" class="notes-meta"></span>
            </div>
            <div id="notes-text" class="notes-text">Selecciona un video para ver el analisis.</div>
            <textarea id="notes-editor" class="notes-editor" maxlength="5000" placeholder="Escribe aqui el analisis del video..."></textarea>
            <div id="notes-actions" class="notes-actions">
              <button id="save-notes" class="btn btn-save" type="button">Guardar analisis</button>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const listEl = document.getElementById('video-list');
    const player = document.getElementById('player');
    const currentTitle = document.getElementById('current-title');
    const logoutBtn = document.getElementById('logout');
    const adminLink = document.getElementById('admin-link');
    const notesText = document.getElementById('notes-text');
    const notesEditor = document.getElementById('notes-editor');
    const notesMeta = document.getElementById('notes-meta');
    const notesActions = document.getElementById('notes-actions');
    const saveNotesBtn = document.getElementById('save-notes');
    let videos = [];
    let currentRole = null;
    let currentVideoId = null;

    function formatDate(value) {
      if (!value) return '';
      const d = new Date(value);
      return d.toLocaleDateString('es-ES');
    }

    async function checkSession() {
      const resp = await fetch('/api/auth/status');
      const data = await resp.json();
      if (!data.authenticated) {
        location.replace('/login');
        return false;
      }
      currentRole = data.role;
      if (data.role === 'admin') {
        adminLink.style.display = 'inline-block';
        notesEditor.style.display = 'block';
        notesActions.style.display = 'flex';
      }
      return true;
    }

    function renderList() {
      if (!videos.length) {
        listEl.innerHTML = '<div class="empty">No hay videos disponibles en la carpeta privada.</div>';
        return;
      }
      listEl.innerHTML = videos.map((v, idx) => `
        <button class="item ${idx === 0 ? 'active' : ''}" data-id="${v.id}" data-title="${(v.title || '').replace(/"/g, '&quot;')}">
          <span class="title">${v.title}</span>
          <span class="meta">${formatDate(v.modifiedTime)}</span>
        </button>
      `).join('');
    }

    async function loadNotes(videoId) {
      notesMeta.textContent = 'Cargando analisis...';
      const resp = await fetch(`/api/private/videos/${encodeURIComponent(videoId)}/notes`);
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) {
        notesMeta.textContent = '';
        notesText.textContent = data.error || 'No se pudo cargar el analisis.';
        notesEditor.value = '';
        return;
      }
      const text = (data.text || '').trim();
      notesText.textContent = text || 'No hay analisis para este video.';
      notesEditor.value = data.text || '';
      notesMeta.textContent = data.updatedAt
        ? `Actualizado: ${new Date(data.updatedAt).toLocaleString('es-ES')}${data.updatedBy ? ` · ${data.updatedBy}` : ''}`
        : '';
    }

    async function playVideo(id, title) {
      currentVideoId = id;
      currentTitle.textContent = title || 'Reproduciendo';
      player.src = `/api/private/videos/${encodeURIComponent(id)}/stream`;
      player.play().catch(() => {});
      document.querySelectorAll('.item').forEach((btn) => btn.classList.toggle('active', btn.dataset.id === id));
      await loadNotes(id);
    }

    async function loadVideos() {
      const resp = await fetch('/api/private/videos');
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) {
        listEl.innerHTML = `<div class="empty">${data.error || 'No se pudieron cargar los videos.'}</div>`;
        return;
      }
      videos = data.videos || [];
      renderList();
      if (videos[0]) await playVideo(videos[0].id, videos[0].title);
    }

    listEl.addEventListener('click', (e) => {
      const btn = e.target.closest('.item');
      if (!btn) return;
      playVideo(btn.dataset.id, btn.dataset.title);
    });

    saveNotesBtn.addEventListener('click', async () => {
      if (currentRole !== 'admin' || !currentVideoId) return;
      const text = notesEditor.value.trim();
      saveNotesBtn.disabled = true;
      saveNotesBtn.textContent = 'Guardando...';
      const resp = await fetch(`/api/private/videos/${encodeURIComponent(currentVideoId)}/notes`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      const data = await resp.json().catch(() => ({}));
      saveNotesBtn.disabled = false;
      saveNotesBtn.textContent = 'Guardar analisis';
      if (!resp.ok) {
        const extra = data.detail ? ` (${data.detail})` : '';
        notesMeta.textContent = (data.error || 'No se pudo guardar el analisis.') + extra;
        return;
      }
      notesText.textContent = text || 'No hay analisis para este video.';
      notesMeta.textContent = data.updatedAt
        ? `Actualizado: ${new Date(data.updatedAt).toLocaleString('es-ES')}${data.updatedBy ? ` · ${data.updatedBy}` : ''}`
        : '';
    });

    logoutBtn.addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST' });
      location.replace('/login');
    });

    (async () => {
      const ok = await checkSession();
      if (!ok) return;
      await loadVideos();
    })();
  </script>
</body>
</html>
